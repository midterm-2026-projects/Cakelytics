name: CI Pipeline

on:
  push:
    branches: ["**"]
  pull_request:
    branches: 
      - "main"

jobs:

  backend-tests:
    name: "Backend Tests"
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: Backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
          # Inayos: Tinanggal ang duplicate path mapping dahil gumagana na ang default directory runner dito

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test
        env:
          NODE_ENV: test


  frontend-tests:
    name: "Frontend Tests"
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
          # Inayos: Tinanggal ang duplicate path mapping para hindi mag-conflict sa front-end builder

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test