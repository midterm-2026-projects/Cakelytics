name: CI Pipeline

on:
  push:
    branches: ["**"]
  pull_request:
    branches: 
      - "main"

jobs:

  backend-tests:
    name: "Backend Tests"
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: Backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: Backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run linting
        run: npm run lint || echo "No lint script or warnings found"

      - name: Run unit tests
        run: npm test
        env:
          NODE_ENV: test


  frontend-tests:
    name: "Frontend Tests"
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run linting
        run: npm run lint || echo "No lint script or warnings found"

      - name: Run unit tests
        run: npm test