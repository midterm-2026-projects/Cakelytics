<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Aileen Cake Max</title>
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#5C3317">
    <link rel="apple-touch-icon" href="/logo.png">

    <style>
      #installAppBtn {
        display: none;
        position: fixed;
        top: 72px;
        right: 20px;
        z-index: 9999;
        width: 40px;
        height: 40px;
        border-radius: 50%;
        background: #5C3317;
        border: none;
        cursor: grab;
        align-items: center;
        justify-content: center;
        box-shadow: 0 0 0 0 rgba(92, 51, 23, 0.4);
        animation: pulse 2.5s infinite;
        transition: background 0.2s, transform 0.1s;
        -webkit-user-select: none;
        user-select: none;
        touch-action: none;
      }

      #installAppBtn:hover {
        background: #3E2008;
      }

      #installAppBtn:active {
        cursor: grabbing;
        transform: scale(0.95);
        animation: none;
        box-shadow: 0 0 0 6px rgba(92, 51, 23, 0.15);
      }

      #installAppBtn svg {
        width: 18px;
        height: 18px;
        stroke: white;
        pointer-events: none;
        flex-shrink: 0;
      }

      @keyframes pulse {
        0%   { box-shadow: 0 0 0 0 rgba(92, 51, 23, 0.45); }
        60%  { box-shadow: 0 0 0 10px rgba(92, 51, 23, 0); }
        100% { box-shadow: 0 0 0 0 rgba(92, 51, 23, 0); }
      }

      @media (max-width: 480px) {
        #installAppBtn {
          top: 60px;
          right: 14px;
          width: 36px;
          height: 36px;
        }
        #installAppBtn svg {
          width: 16px;
          height: 16px;
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>

    <button id="installAppBtn" title="Install app">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
        <polyline points="7 10 12 15 17 10" />
        <line x1="12" y1="15" x2="12" y2="3" />
      </svg>
    </button>

    <script>
      let deferredPrompt;
      const btn = document.getElementById('installAppBtn');
      let isDragging = false;
      let hasMoved = false;
      let startX, startY, startRight, startTop;

      window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        deferredPrompt = e;
        btn.style.display = 'flex';
      });

      btn.addEventListener('pointerdown', (e) => {
        isDragging = true;
        hasMoved = false;
        btn.setPointerCapture(e.pointerId);

        const rect = btn.getBoundingClientRect();
        startX = e.clientX;
        startY = e.clientY;
        startRight = window.innerWidth - rect.right;
        startTop = rect.top;

        btn.style.animation = 'none';
        btn.style.transition = 'background 0.2s';
      });

      btn.addEventListener('pointermove', (e) => {
        if (!isDragging) return;

        const dx = e.clientX - startX;
        const dy = e.clientY - startY;

        if (Math.abs(dx) > 4 || Math.abs(dy) > 4) hasMoved = true;
        if (!hasMoved) return;

        let newRight = startRight - dx;
        let newTop = startTop + dy;

        newRight = Math.max(8, Math.min(window.innerWidth - 48, newRight));
        newTop = Math.max(8, Math.min(window.innerHeight - 48, newTop));

        btn.style.right = newRight + 'px';
        btn.style.top = newTop + 'px';
      });

      btn.addEventListener('pointerup', async (e) => {
        isDragging = false;
        btn.style.transition = 'background 0.2s, transform 0.1s';

        if (!hasMoved) {
          btn.style.animation = 'pulse 2.5s infinite';
          if (deferredPrompt) {
            deferredPrompt.prompt();
            const { outcome } = await deferredPrompt.userChoice;
            if (outcome === 'accepted') console.log('Na-install na!');
            deferredPrompt = null;
            btn.style.display = 'none';
          }
        } else {
          btn.style.animation = 'pulse 2.5s infinite';
        }
      });

      window.addEventListener('appinstalled', () => {
        btn.style.display = 'none';
      });
    </script>
  </body>
</html>
